<template>
    <div class="gkd-root">
        <!-- ヘッダー -->
        <div class="gkd-header">
            <div class="gkd-header-left">
                <div class="gkd-logo-dot"></div>
                <span class="gkd-title">HRsupport数値管理 <span class="gkd-title-sub">全体KPI</span> <span class="gkd-title-sub" style="font-size:10px;opacity:0.5">v2026.05.11-8</span></span>
            </div>
            <div class="gkd-filters">
                <div class="gkd-filter-group">
                    <span class="gkd-filter-label">年度</span>
                    <lightning-combobox label="年度" variant="label-hidden" value={selectedYear}
                        options={yearOptions} onchange={handleYearChange} class="gkd-filter-select">
                    </lightning-combobox>
                </div>
                <div class="gkd-filter-group">
                    <span class="gkd-filter-label">卒年</span>
                    <lightning-combobox label="卒年" variant="label-hidden" value={selectedGradYear}
                        options={gradYearOptions} onchange={handleGradYearChange} class="gkd-filter-select">
                    </lightning-combobox>
                </div>
                <div class="gkd-filter-group">
                    <span class="gkd-filter-label">月</span>
                    <lightning-combobox label="月" variant="label-hidden" value={selectedMonth}
                        options={monthOptions} onchange={handleMonthChange} class="gkd-filter-select">
                    </lightning-combobox>
                </div>
            </div>
        </div>

        <!-- 業種切替トグル -->
        <div class="gkd-biz-toggle">
            <button class={bizReferralBtnClass} data-line="referral" onclick={handleBizToggle}>紹介</button>
            <button class={bizSoukyakuBtnClass} data-line="soukyaku" onclick={handleBizToggle}>送客</button>
        </div>

        <template if:true={isLoading}>
            <div class="gkd-loading">
                <lightning-spinner alternative-text="読み込み中" size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <template if:true={isReferral}>
            <!-- 期間切替セグメント（年度 | H1 | H2 | Q1〜Q4） -->
            <div class="gkd-period-bar">
                <span class="gkd-period-label">期間</span>
                <template for:each={summaryPeriodOptions} for:item="opt">
                    <button key={opt.key} class={opt.cls} data-period={opt.key} onclick={handleSummaryPeriodChange}>{opt.label}</button>
                </template>
            </div>

            <!-- 固定サマリーバー（常時表示） -->
            <div class="gkd-fixed-summary">
                <div class="gkd-fsum-item">
                    <span class="gkd-fsum-label">紹介人数</span>
                    <span class="gkd-fsum-value">{totalStudentCount}<span class="gkd-fsum-unit">人</span></span>
                </div>
                <div class="gkd-fsum-item">
                    <span class="gkd-fsum-label">面談学生</span>
                    <span class="gkd-fsum-value">{totalMeetings}<span class="gkd-fsum-unit">人</span></span>
                </div>
                <div class="gkd-fsum-arrow">
                    <span class="gkd-fsum-rate">{meetingToReferralPct}</span>
                    <span class="gkd-fsum-arrow-icon">→</span>
                </div>
                <div class="gkd-fsum-item">
                    <span class="gkd-fsum-label">求人紹介数</span>
                    <span class="gkd-fsum-value">{totalReferrals}<span class="gkd-fsum-unit">件</span></span>
                </div>
                <div class="gkd-fsum-arrow">
                    <span class="gkd-fsum-rate">{referralToAcceptedPct}</span>
                    <span class="gkd-fsum-arrow-icon">→</span>
                </div>
                <div class="gkd-fsum-item">
                    <span class="gkd-fsum-label">内定承諾</span>
                    <span class="gkd-fsum-value">{totalAccepted}<span class="gkd-fsum-unit">件</span></span>
                </div>
                <div class="gkd-fsum-divider"></div>
                <div class="gkd-fsum-item gkd-fsum-green">
                    <span class="gkd-fsum-label">実売上</span>
                    <span class="gkd-fsum-value gkd-green">{totalRevenueDisplay}</span>
                </div>
                <div class="gkd-fsum-item gkd-fsum-green">
                    <span class="gkd-fsum-label">計上売上</span>
                    <span class="gkd-fsum-value gkd-green">{totalBookedRevenueDisplay}</span>
                </div>
                <div class="gkd-fsum-item gkd-fsum-amber">
                    <span class="gkd-fsum-label">加重ヨミ</span>
                    <span class="gkd-fsum-value gkd-amber">{totalWeightedYomiDisplay}</span>
                </div>
            </div>

            <!-- タブナビ -->
            <div class="gkd-tabnav">
                <button class={tab0Class} onclick={handleTab} data-tab="0">年度サマリー</button>
                <button class={tab1Class} onclick={handleTab} data-tab="1">月別トレンド</button>
                <button class={tab4Class} onclick={handleTab} data-tab="4">母集団分析</button>
                <button class={tab2Class} onclick={handleTab} data-tab="2">担当者別 KPI</button>
                <button class={tab5Class} onclick={handleTab} data-tab="5">紹介者別 KPI</button>
                <button class={tab3Class} onclick={handleTab} data-tab="3">企業別 KPI</button>
                <button class={tab8Class} onclick={handleTab} data-tab="8">企業別進捗</button>
                <button class={tab6Class} onclick={handleTab} data-tab="6">CA別実績ヨミ管理</button>
                <button class={tab9Class} onclick={handleTab} data-tab="9">学生別売上</button>
                <button class={tab7Class} onclick={handleTab} data-tab="7">チームヨミ管理</button>
            </div>

            <!-- Tab 0: 年度サマリー -->
            <template if:true={isTab0}>
                <!-- ★ サマリーKPIバー（統一スタイル） -->
                <div class="gkd-byname-kpi-bar">
                    <div class="gkd-bkpi-card">
                        <div class="gkd-bkpi-label">未着手案件</div>
                        <div class="gkd-bkpi-value gkd-bkpi-red">{staleStudentDisplay}</div>
                        <div class="gkd-bkpi-sub">14日以上面談なし</div>
                    </div>
                    <div class="gkd-bkpi-card">
                        <div class="gkd-bkpi-label">平均承諾サイクル</div>
                        <div class="gkd-bkpi-value">{avgAcceptCycleDisplay}<span class="gkd-bkpi-unit">日</span></div>
                        <div class="gkd-bkpi-sub">紹介→承諾の期間</div>
                    </div>
                    <div class="gkd-bkpi-sep"></div>
                    <div class="gkd-bkpi-card" style="flex:2; min-width:280px">
                        <div class="gkd-bkpi-label">ヨミ確度別 進行中件数</div>
                        <div class="gkd-yomi-stack">
                            <template for:each={yomiAccuracyBars} for:item="seg">
                                <div key={seg.label} class={seg.cls} style={seg.style} title={seg.title}>
                                    <span class="gkd-yomi-seg-label">{seg.label}</span>
                                    <span class="gkd-yomi-seg-cnt">{seg.count}</span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- クォーター別 -->
                <div class="gkd-panel" style="margin-bottom:12px;">
                    <div class="gkd-panel-title">クォーター別実績（6月始まり）</div>
                    <template if:true={hasQuarterlyData}>
                        <div class="gkd-quarter-row">
                            <template for:each={quarterlyCards} for:item="q">
                                <div key={q.label} class="gkd-quarter-card">
                                    <div class="gkd-quarter-label">{q.label} <span class="gkd-quarter-period">{q.period}</span></div>
                                    <div class="gkd-quarter-value">{q.referrals}<span class="gkd-unit">件</span></div>
                                    <div class="gkd-quarter-sub">面談 {q.meetings}件</div>
                                    <div class="gkd-quarter-sub">承諾 {q.accepted}件</div>
                                    <div class="gkd-quarter-sub muted">面→紹 {q.meetingToReferralRate}</div>
                                    <div class="gkd-quarter-sub gkd-green">{q.revenueDisplay}</div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template if:false={hasQuarterlyData}>
                        <div class="gkd-empty">年度を選択するとクォーター別データが表示されます</div>
                    </template>
                    <!-- H1/H2 半期集計 -->
                    <template if:true={hasQuarterlyData}>
                        <div class="gkd-half-row">
                            <template for:each={halfYearCards} for:item="h">
                                <div key={h.label} class="gkd-half-card">
                                    <div class="gkd-half-label">{h.label} <span class="gkd-quarter-period">{h.period}</span></div>
                                    <div class="gkd-half-value gkd-green">{h.revenueDisplay}</div>
                                    <div class="gkd-quarter-sub">紹介 {h.referrals}件 / 承諾 {h.accepted}件</div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <!-- 年度比較（前年データがある場合のみ） -->
                    <template if:true={yoyCompare}>
                        <template if:true={yoyCompare.hasPrev}>
                            <div class="gkd-yoy-panel">
                                <div class="gkd-yoy-title">年度比較</div>
                                <div class="gkd-yoy-row">
                                    <span class="gkd-yoy-cur-label">{yoyCompare.curLabel}</span>
                                    <div class="gkd-yoy-bar-wrap">
                                        <div class="gkd-yoy-bar gkd-yoy-bar--cur" style={yoyCompare.curBarStyle}></div>
                                    </div>
                                    <span class="gkd-yoy-rev">{yoyCompare.curRevDisplay}</span>
                                    <span class={yoyCompare.growthClass}>{yoyCompare.growthDisplay}</span>
                                </div>
                                <div class="gkd-yoy-row">
                                    <span class="gkd-yoy-cur-label">{yoyCompare.prevLabel}</span>
                                    <div class="gkd-yoy-bar-wrap">
                                        <div class="gkd-yoy-bar gkd-yoy-bar--prev" style={yoyCompare.prevBarStyle}></div>
                                    </div>
                                    <span class="gkd-yoy-rev">{yoyCompare.prevRevDisplay}</span>
                                </div>
                                <div class="gkd-yoy-sub">紹介数: {yoyCompare.curRefDisplay} (前年: {yoyCompare.prevRefDisplay})</div>
                            </div>
                        </template>
                    </template>
                </div>
                <!-- 選考ファネル + ドーナツチャート -->
                <div class="gkd-panel" style="margin-bottom:12px;">
                    <div class="gkd-panel-title">選考ファネル（累積件数）</div>
                    <template if:true={hasFunnelData}>
                        <div class="gkd-funnel-donut-row">
                            <!-- ファネルバー -->
                            <div class="gkd-funnel-wrap" style="flex:1">
                                <template for:each={funnelStages} for:item="stage">
                                    <div key={stage.label} class="gkd-funnel-row">
                                        <div class="gkd-funnel-label">{stage.label}</div>
                                        <div class="gkd-funnel-track">
                                            <div class="gkd-funnel-fill" style={stage.barStyle}></div>
                                        </div>
                                        <div class="gkd-funnel-count">{stage.count}<span class="gkd-pct"> ({stage.pct}%)</span></div>
                                    </div>
                                </template>
                            </div>
                            <!-- ドーナツチャート -->
                            <div class="gkd-donut-wrap">
                                <svg viewBox="0 0 180 180" class="gkd-donut-svg">
                                    <circle cx="90" cy="90" r="60" fill="none" stroke="#eef0f3" stroke-width="28"></circle>
                                    <template for:each={donutSegments} for:item="seg">
                                        <circle key={seg.label} cx="90" cy="90" r="60"
                                            fill="none"
                                            stroke={seg.color}
                                            stroke-width="28"
                                            stroke-dasharray={seg.dash}
                                            stroke-dashoffset={seg.offset}
                                            transform="rotate(-90 90 90)">
                                        </circle>
                                    </template>
                                </svg>
                                <div class="gkd-donut-legend">
                                    <template for:each={donutSegments} for:item="seg">
                                        <div key={seg.label} class="gkd-donut-legend-item">
                                            <span class="gkd-donut-dot" style={seg.dotStyle}></span>
                                            <span class="gkd-donut-lbl">{seg.label}</span>
                                            <span class="gkd-donut-pct">{seg.pct}%</span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                    <template if:false={hasFunnelData}>
                        <div class="gkd-empty">データなし</div>
                    </template>
                </div>
                <!-- 月別実売上トレンド グラフ -->
                <div class="gkd-panel" style="margin-bottom:12px;">
                    <div class="gkd-panel-title">月別実売上トレンド</div>
                    <template if:true={hasMonthlyData}>
                        <div class="gkd-chart-wrap">
                            <svg viewBox="0 0 620 130" class="gkd-svg">
                                <template for:each={trendRevSvgGridLines} for:item="line">
                                    <line key={line.key} x1="44" y1={line.y} x2="610" y2={line.y} stroke="#dde2e8" stroke-width="1"></line>
                                    <text key={line.key} x="40" y={line.labelY} text-anchor="end" fill="#9ea5ad" font-size="8">{line.label}</text>
                                </template>
                                <template for:each={trendRevBarItems} for:item="bar">
                                    <g key={bar.key}>
                                        <rect x={bar.x} y={bar.y} width={bar.width} height={bar.height} fill="#2e844a" rx="2" opacity="0.8"></rect>
                                        <template if:true={bar.hasRev}>
                                            <text x={bar.centerX} y={bar.countY} text-anchor="middle" fill="#1c5c30" font-size="7">{bar.revLabel}</text>
                                        </template>
                                        <text x={bar.centerX} y="126" text-anchor="middle" fill="#9ea5ad" font-size="8">{bar.label}</text>
                                    </g>
                                </template>
                            </svg>
                        </div>
                    </template>
                    <template if:false={hasMonthlyData}>
                        <div class="gkd-empty">月別データなし</div>
                    </template>
                </div>

                <!-- CA別 加重ヨミ TOP5 (バーチャート版) -->
                <div class="gkd-panel">
                    <div class="gkd-panel-title">CA別 加重ヨミ TOP5</div>
                    <template if:true={hasConsultantData}>
                        <div class="gkd-top5-wrap">
                            <template for:each={consultantTop5} for:item="row">
                                <div key={row.name} class="gkd-top5-row">
                                    <div class={row.rankClass}>{row.rank}</div>
                                    <div class="gkd-top5-name">{row.name}</div>
                                    <div class="gkd-top5-bar-track">
                                        <div class="gkd-top5-bar-fill" style={row.barStyle}></div>
                                    </div>
                                    <div class="gkd-top5-meta">紹{row.referrals} / 承{row.accepted}</div>
                                    <div class="gkd-top5-amount gkd-green">{row.weightedYomiDisplay}</div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template if:false={hasConsultantData}>
                        <div class="gkd-empty">データなし</div>
                    </template>
                </div>
            </template>

            <!-- Tab 1: 月別トレンド -->
            <template if:true={isTab1}>
                <template if:true={hasMonthlyData}>
                    <!-- 紹介数・面談数グラフ（2列） -->
                    <div class="gkd-two-col" style="margin-bottom:12px;gap:12px;">
                        <div class="gkd-panel">
                            <div class="gkd-panel-title">月別紹介数</div>
                            <div class="gkd-chart-wrap">
                                <svg viewBox="0 0 620 140" class="gkd-svg">
                                    <template for:each={trendGridLines} for:item="line">
                                        <line key={line.y} x1="44" y1={line.y} x2="610" y2={line.y} stroke="#dde2e8" stroke-width="1"></line>
                                        <text key={line.label} x="40" y={line.labelY} text-anchor="end" fill="#9ea5ad" font-size="9">{line.value}</text>
                                    </template>
                                    <template for:each={trendBarItems} for:item="bar">
                                        <g key={bar.label}>
                                            <rect x={bar.x} y={bar.y} width={bar.width} height={bar.height} fill="#0176d3" rx="2" opacity="0.85"></rect>
                                            <text x={bar.centerX} y={bar.countY} text-anchor="middle" fill="#0058a3" font-size="8">{bar.count}</text>
                                            <text x={bar.centerX} y="136" text-anchor="middle" fill="#9ea5ad" font-size="8">{bar.label}</text>
                                        </g>
                                    </template>
                                </svg>
                            </div>
                        </div>
                        <div class="gkd-panel">
                            <div class="gkd-panel-title">月別面談数</div>
                            <div class="gkd-chart-wrap">
                                <svg viewBox="0 0 620 140" class="gkd-svg">
                                    <template for:each={trendMeetingGridLines} for:item="line">
                                        <line key={line.key} x1="44" y1={line.y} x2="610" y2={line.y} stroke="#dde2e8" stroke-width="1"></line>
                                        <text key={line.key} x="40" y={line.labelY} text-anchor="end" fill="#9ea5ad" font-size="9">{line.value}</text>
                                    </template>
                                    <template for:each={trendMeetingBarItems} for:item="bar">
                                        <g key={bar.key}>
                                            <rect x={bar.x} y={bar.y} width={bar.width} height={bar.height} fill="#9b59b6" rx="2" opacity="0.8"></rect>
                                            <template if:true={bar.meetings}>
                                                <text x={bar.centerX} y={bar.countY} text-anchor="middle" fill="#6c3483" font-size="8">{bar.meetings}</text>
                                            </template>
                                            <text x={bar.centerX} y="136" text-anchor="middle" fill="#9ea5ad" font-size="8">{bar.label}</text>
                                        </g>
                                    </template>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <!-- 月別売上グラフ -->
                    <div class="gkd-panel" style="margin-bottom:12px;">
                        <div class="gkd-panel-title">月別承諾売上</div>
                        <div class="gkd-chart-wrap">
                            <svg viewBox="0 0 620 130" class="gkd-svg">
                                <template for:each={trendRevSvgGridLines} for:item="line">
                                    <line key={line.key} x1="44" y1={line.y} x2="610" y2={line.y} stroke="#dde2e8" stroke-width="1"></line>
                                    <text key={line.key} x="40" y={line.labelY} text-anchor="end" fill="#9ea5ad" font-size="8">{line.label}</text>
                                </template>
                                <template for:each={trendRevBarItems} for:item="bar">
                                    <g key={bar.key}>
                                        <rect x={bar.x} y={bar.y} width={bar.width} height={bar.height} fill="#2e844a" rx="2" opacity="0.8"></rect>
                                        <template if:true={bar.hasRev}>
                                            <text x={bar.centerX} y={bar.countY} text-anchor="middle" fill="#1c5c30" font-size="7">{bar.revLabel}</text>
                                        </template>
                                        <text x={bar.centerX} y="126" text-anchor="middle" fill="#9ea5ad" font-size="8">{bar.label}</text>
                                    </g>
                                </template>
                            </svg>
                        </div>
                    </div>
                    <!-- 月別詳細テーブル -->
                    <div class="gkd-panel">
                        <div class="gkd-panel-title">月別詳細</div>
                        <div class="gkd-table-wrap">
                            <table class="gkd-table">
                                <thead>
                                    <tr>
                                        <th>月</th>
                                        <th class="r">面談学生</th>
                                        <th class="r">紹介数</th>
                                        <th class="r">面→紹率</th>
                                        <th class="r">承諾数</th>
                                        <th class="r">承諾率</th>
                                        <th class="r">承諾売上</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={trendTableRows} for:item="row">
                                        <tr key={row.label}>
                                            <td class="name-cell">{row.label}</td>
                                            <td class="r">{row.meetings}</td>
                                            <td class="r">{row.count}</td>
                                            <td class="r muted">{row.mtgToRefRate}</td>
                                            <td class="r">{row.accepted}</td>
                                            <td class="r muted">{row.accRate}</td>
                                            <td class="r green">{row.revenueDisplay}</td>
                                        </tr>
                                    </template>
                                </tbody>
                                <tfoot>
                                    <tr class="total-row">
                                        <td>合計</td>
                                        <td class="r">{trendTotalRow.meetings}</td>
                                        <td class="r">{trendTotalRow.count}</td>
                                        <td class="r muted">{trendTotalRow.mtgToRefRate}</td>
                                        <td class="r">{trendTotalRow.accepted}</td>
                                        <td class="r muted">{trendTotalRow.accRate}</td>
                                        <td class="r green">{trendTotalRow.revenueDisplay}</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </template>
                <template if:false={hasMonthlyData}>
                    <div class="gkd-panel"><div class="gkd-empty">データなし</div></div>
                </template>
            </template>

            <!-- Tab 2: 担当者別KPI -->
            <template if:true={isTab2}>
                <!-- ★ サマリーバー（タブ上部）統一スタイル -->
                <div class="gkd-byname-kpi-bar">
                    <div class="gkd-bkpi-card">
                        <div class="gkd-bkpi-label">紹介数</div>
                        <div class="gkd-bkpi-value">{totalReferrals}<span class="gkd-bkpi-unit">件</span></div>
                    </div>
                    <div class="gkd-bkpi-card">
                        <div class="gkd-bkpi-label">承諾数</div>
                        <div class="gkd-bkpi-value">{totalAccepted}<span class="gkd-bkpi-unit">件</span></div>
                    </div>
                    <div class="gkd-bkpi-card gkd-bkpi-card--accent">
                        <div class="gkd-bkpi-label">承諾率</div>
                        <div class="gkd-bkpi-value gkd-bkpi-blue">{acceptanceRateOverMeeting}</div>
                    </div>
                    <div class="gkd-bkpi-card">
                        <div class="gkd-bkpi-label">承諾後辞退率</div>
                        <div class="gkd-bkpi-value">{totalDeclineAfterAcceptRate}</div>
                    </div>
                    <div class="gkd-bkpi-sep"></div>
                    <div class="gkd-bkpi-card">
                        <div class="gkd-bkpi-label">実売上</div>
                        <div class="gkd-bkpi-value gkd-bkpi-green">{totalRevenueDisplay}</div>
                    </div>
                    <div class="gkd-bkpi-card">
                        <div class="gkd-bkpi-label">計上売上</div>
                        <div class="gkd-bkpi-value gkd-bkpi-green">{totalBookedRevenueDisplay}</div>
                    </div>
                    <div class="gkd-bkpi-card">
                        <div class="gkd-bkpi-label">平均承諾単価</div>
                        <div class="gkd-bkpi-value">{avgAcceptPriceDisplay}</div>
                    </div>

                            <label key={item.key} class={item.itemClass} data-key={item.key} onclick={handleChecklistToggle}>
                                <span class={item.checkClass}></span>
                                <span class="gkd-cl-text">{item.label}</span>
                            </label>
                        </template>
                    </div>

                    <div class="gkd-checklist-footer">
                        <button class="gkd-save-btn" onclick={handleSaveChecklist}>チェックリストを保存</button>
                    </div>
                </div>

            </div>
        </div>
    </template>
</template>
